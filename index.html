<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-transform">
  <meta http-equiv="Cache-Control" content="no-siteapp">
  <meta name="applicable-device" content="pc,mobile">
  <meta name="keywords" content="个人导航">
  <meta name="description" content="个人自用 Windows 平台下的导航">
  <title>首页 - 个人导航</title>
  <link rel="stylesheet" href="css/ops-coffee.css" type="text/css">
  <link rel="shortcut icon" href="images/favicon.ico">
  <link rel="preload" as="image" href="images/beijing.jpg">
  <link rel="dns-prefetch" href="//www.baidu.com">
  <link rel="preconnect" href="https://www.baidu.com" crossorigin>
  <link rel="dns-prefetch" href="//www.google.com">
  <link rel="preconnect" href="https://www.google.com" crossorigin>
  <link rel="dns-prefetch" href="//www.bilibili.com">
  <link rel="preconnect" href="https://www.bilibili.com" crossorigin>
</head>
<body class="site-page" data-page="home">
  <div class="header" data-site-header></div>

  <main id="content-wrapper">
    <div class="container">
      <section class="sousuo search-section" aria-label="搜索">
        <div class="search">
          <div class="search-box">
            <button
              class="search-engine-toggle"
              id="search-engine-toggle"
              type="button"
              aria-expanded="false"
              aria-controls="search-engine-panel"
            >
              <img class="search-icon" src="" alt="">
            </button>
            <label class="sr-only" for="txt">搜索关键词</label>
            <input
              type="search"
              id="txt"
              class="search-input"
              placeholder="输入关键词搜索"
              autocomplete="off"
            >
            <button class="search-btn" id="search-btn" type="button" aria-label="搜索">
              <img src="images/sou0.png" alt="">
            </button>
          </div>
          <div class="search-engine" id="search-engine-panel" hidden>
            <ul class="search-engine-list" aria-label="搜索引擎列表"></ul>
          </div>
        </div>
      </section>

      <div data-nav-page="home"></div>
    </div>
  </main>

  <script src="js/site-shell.js"></script>
  <script data-book2html-nav>
    (() => {
      const pages = [{ href: "bookmarks_对话实例.html", label: "对话实例" }];
      const list = document.querySelector(".header-menu ul");
      if (!list) return;

      const currentFile = decodeURIComponent((location.pathname.split("/").pop() || "index.html"));
      const existingHrefs = new Set([...list.querySelectorAll("a")].map((link) => link.getAttribute("href")));

      pages.forEach((page) => {
        if (!page.href || !page.label || existingHrefs.has(page.href)) return;

        const item = document.createElement("li");
        const link = document.createElement("a");

        if (page.href === currentFile) {
          item.className = "current-menu-item";
          link.setAttribute("aria-current", "page");
        }

        link.href = page.href;
        link.textContent = page.label;
        item.append(link);
        list.append(item);
        existingHrefs.add(page.href);
      });
    })();
  </script>

  <script src="js/site-preferences.js"></script>
  <script src="js/site-data.js"></script>
  <script src="js/site-renderer.js"></script>
  <script src="js/nav.ops-coffee.min.js"></script>
  <script src="js/liquid-glass.js" defer></script>
  <script src="js/background-loader.js"></script>
</body>
</html>
